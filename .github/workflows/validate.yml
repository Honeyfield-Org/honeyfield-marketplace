name: Validate Marketplace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -e
          for f in .claude-plugin/marketplace.json plugins/*/.claude-plugin/plugin.json plugins/*/.mcp.json; do
            [ -f "$f" ] || continue
            python3 -m json.tool "$f" > /dev/null
            echo "OK: $f"
          done

      - name: Check marketplace plugin sources exist
        run: |
          set -e
          python3 - <<'EOF'
          import json, os, sys
          with open(".claude-plugin/marketplace.json") as f:
              mp = json.load(f)
          missing = []
          for p in mp["plugins"]:
              src = p["source"]
              if not os.path.isfile(os.path.join(src, ".claude-plugin", "plugin.json")):
                  missing.append(src)
          if missing:
              print("Missing plugin.json for:", missing)
              sys.exit(1)
          print(f"All {len(mp['plugins'])} plugin sources valid")
          EOF

      - name: Check skill frontmatter
        run: |
          set -e
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --quiet pyyaml \
            || python3 -m pip install --quiet --break-system-packages pyyaml
          python3 .github/scripts/check_skill_frontmatter.py

      - name: Claude plugin validate
        run: |
          set -e
          npm install -g @anthropic-ai/claude-code
          for d in plugins/*/; do
            claude plugin validate "$d"
            echo "OK: $d"
          done
